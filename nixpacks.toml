[phases.setup]
nixPkgs = [
  "php82",
  "php82Extensions.pdo_pgsql",
  "php82Extensions.intl",
  "php82Extensions.zip",
  "nodejs_22"
]

[phases.install]
cmds = [
  "composer install --optimize-autoloader",
  "npm install",
  "npm run build"
]

[start]
cmd = "php artisan serve --host=0.0.0.0 --port=$PORT"